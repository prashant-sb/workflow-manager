name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python (for yamllint)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pip (latest)
        run: python -m pip install --upgrade pip

      - name: Run Makefile
        run: make